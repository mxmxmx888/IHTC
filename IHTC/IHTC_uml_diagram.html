<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IHTC UML Class Diagram</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --page: #fbf8f2;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #667085;
      --line: #667085;
      --accent: #8f5f2a;
      --soft: #ddd4c3;
    }
    html, body {
      margin: 0;
      background: var(--bg);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--ink);
    }
    .page {
      width: 1600px;
      margin: 0 auto;
      padding: 24px;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: 0.2px;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }
    svg {
      width: 1552px;
      height: 1060px;
      display: block;
      background: linear-gradient(180deg, #fcfaf5 0%, #f2ecdf 100%);
      border: 1px solid #d4ccbc;
      border-radius: 18px;
      box-shadow: 0 12px 36px rgba(31, 41, 55, 0.08);
    }
    .class-box {
      fill: var(--panel);
      stroke: var(--line);
      stroke-width: 2;
      rx: 10;
      ry: 10;
    }
    .divider {
      stroke: var(--soft);
      stroke-width: 1.4;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      fill: var(--accent);
    }
    .attr {
      font-size: 13px;
      fill: var(--ink);
    }
    .section {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      fill: var(--muted);
    }
    .link {
      fill: none;
      stroke: #7a8596;
      stroke-width: 2.2;
      marker-end: url(#arrow);
    }
    .link.dashed {
      stroke-dasharray: 7 6;
    }
    .inherit {
      fill: none;
      stroke: #7a8596;
      stroke-width: 2.2;
      marker-end: url(#triangle);
    }
    .label {
      font-size: 11px;
      fill: #374151;
      paint-order: stroke;
      stroke: #f7f4ee;
      stroke-width: 4;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>IHTC</h1>
    <p>One-page UML class diagram for the integrated healthcare timetabling metamodel.</p>
    <svg viewBox="0 0 1552 1060" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
          <path d="M0,0 L12,6 L0,12 Z" fill="#7a8596"/>
        </marker>
        <marker id="triangle" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
          <path d="M0,7 L12,0 L12,14 Z" fill="#ffffff" stroke="#7a8596" stroke-width="1.6"/>
        </marker>
      </defs>

      <text class="section" x="642" y="44">Root Container</text>
      <rect class="class-box" x="602" y="60" width="348" height="226"/>
      <line class="divider" x1="602" y1="108" x2="950" y2="108"/>
      <text class="title" x="624" y="92">HospitalInstance</text>
      <text class="attr" x="624" y="136">patients: [ ] -&gt; Patient</text>
      <text class="attr" x="624" y="160">nurses: [ ] -&gt; Nurse</text>
      <text class="attr" x="624" y="184">surgeons: [ ] -&gt; Surgeon</text>
      <text class="attr" x="624" y="208">rooms: [ ] -&gt; Room</text>
      <text class="attr" x="624" y="232">operatingTheatres: [ ] -&gt; OperatingTheatre</text>
      <text class="attr" x="624" y="256">decisionHorizonLength: int</text>

      <text class="section" x="66" y="286">Core Entities</text>
      <rect class="class-box" x="58" y="302" width="356" height="246"/>
      <line class="divider" x1="58" y1="350" x2="414" y2="350"/>
      <text class="title" x="80" y="332">Patient</text>
      <text class="attr" x="80" y="376">id: int</text>
      <text class="attr" x="80" y="400">isMandatory: boolean</text>
      <text class="attr" x="80" y="424">dueDate: date</text>
      <text class="attr" x="80" y="448">releaseDate: date</text>
      <text class="attr" x="80" y="472">ageGroup: AgeGroup</text>
      <text class="attr" x="80" y="496">gender: Gender</text>
      <text class="attr" x="80" y="520">stayLength: int</text>
      <text class="attr" x="80" y="544">incompatibleRooms: [ ] -&gt; Room</text>
      <text class="attr" x="80" y="568">assignedSurgeonId: -&gt; Surgeon</text>

      <rect class="class-box" x="468" y="302" width="218" height="112"/>
      <line class="divider" x1="468" y1="350" x2="686" y2="350"/>
      <text class="title" x="490" y="332">Nurse</text>
      <text class="attr" x="490" y="376">id: int</text>
      <text class="attr" x="490" y="400">skillLevel: int</text>

      <rect class="class-box" x="738" y="302" width="218" height="96"/>
      <line class="divider" x1="738" y1="350" x2="956" y2="350"/>
      <text class="title" x="760" y="332">Surgeon</text>
      <text class="attr" x="760" y="376">id: int</text>

      <rect class="class-box" x="1008" y="302" width="218" height="96"/>
      <line class="divider" x1="1008" y1="350" x2="1226" y2="350"/>
      <text class="title" x="1030" y="332">Room</text>
      <text class="attr" x="1030" y="376">capacity: int</text>

      <rect class="class-box" x="1278" y="302" width="218" height="96"/>
      <line class="divider" x1="1278" y1="350" x2="1496" y2="350"/>
      <text class="title" x="1300" y="332">OperatingTheatre</text>
      <text class="attr" x="1300" y="376">id: int</text>

      <text class="section" x="66" y="620">Temporal / Supporting Entities</text>
      <rect class="class-box" x="58" y="636" width="332" height="138"/>
      <line class="divider" x1="58" y1="684" x2="390" y2="684"/>
      <text class="title" x="80" y="666">HospitalisationShift</text>
      <text class="attr" x="80" y="710">patientId: -&gt; Patient</text>
      <text class="attr" x="80" y="734">shift: int</text>
      <text class="attr" x="80" y="758">skillLevelRequired: int</text>
      <text class="attr" x="80" y="782">workload: int</text>

      <rect class="class-box" x="430" y="636" width="300" height="124"/>
      <line class="divider" x1="430" y1="684" x2="730" y2="684"/>
      <text class="title" x="452" y="666">NurseRosterEntry</text>
      <text class="attr" x="452" y="710">nurseId: -&gt; Nurse</text>
      <text class="attr" x="452" y="734">shiftId: -&gt; HospitalisationShift</text>
      <text class="attr" x="452" y="758">maxWorkload: int</text>

      <rect class="class-box" x="782" y="636" width="288" height="124"/>
      <line class="divider" x1="782" y1="684" x2="1070" y2="684"/>
      <text class="title" x="804" y="666">SurgeonAvailability</text>
      <text class="attr" x="804" y="710">surgeonId: -&gt; Surgeon</text>
      <text class="attr" x="804" y="734">day: int</text>
      <text class="attr" x="804" y="758">maxOperatingTime: int</text>

      <rect class="class-box" x="1122" y="636" width="306" height="124"/>
      <line class="divider" x1="1122" y1="684" x2="1428" y2="684"/>
      <text class="title" x="1144" y="666">OTAvailability</text>
      <text class="attr" x="1144" y="710">OTId: -&gt; OperatingTheatre</text>
      <text class="attr" x="1144" y="734">day: int</text>
      <text class="attr" x="1144" y="758">maxCapacity: int</text>

      <text class="section" x="66" y="846">Boundary / Decision Entities</text>
      <rect class="class-box" x="58" y="862" width="262" height="96"/>
      <line class="divider" x1="58" y1="910" x2="320" y2="910"/>
      <text class="title" x="80" y="892">Occupant</text>
      <text class="attr" x="80" y="936">assignedRoom: -&gt; Room</text>

      <rect class="class-box" x="424" y="862" width="322" height="138"/>
      <line class="divider" x1="424" y1="910" x2="746" y2="910"/>
      <text class="title" x="446" y="892">Admission</text>
      <text class="attr" x="446" y="936">patientId: -&gt; Patient</text>
      <text class="attr" x="446" y="960">admissionDay: int</text>
      <text class="attr" x="446" y="984">roomId: -&gt; Room</text>
      <text class="attr" x="446" y="1008">OTId: -&gt; OperatingTheatre</text>
      <text class="attr" x="446" y="1032">isPostponed: Yes/No</text>

      <rect class="class-box" x="880" y="862" width="336" height="124"/>
      <line class="divider" x1="880" y1="910" x2="1216" y2="910"/>
      <text class="title" x="902" y="892">RoomShiftAssignment</text>
      <text class="attr" x="902" y="936">nurseId: -&gt; Nurse</text>
      <text class="attr" x="902" y="960">roomId: -&gt; Room</text>
      <text class="attr" x="902" y="984">shift: -&gt; HospitalisationShift</text>

      <rect class="class-box" x="1286" y="862" width="210" height="112"/>
      <line class="divider" x1="1286" y1="910" x2="1496" y2="910"/>
      <text class="title" x="1308" y="892">Enums</text>
      <text class="attr" x="1308" y="936">AgeGroup</text>
      <text class="attr" x="1308" y="960">Gender</text>

      <path class="link" d="M620 286 L620 300 L236 300 L236 302"/>

      <path class="link" d="M700 286 L700 294 L577 294 L577 302"/>

      <path class="link" d="M782 286 L782 294 L847 294 L847 302"/>

      <path class="link" d="M864 286 L864 300 L1117 300 L1117 302"/>

      <path class="link" d="M944 286 L944 294 L1387 294 L1387 302"/>

      <path class="link" d="M224 636 L224 548"/>

      <path class="link" d="M580 636 L580 414"/>

      <path class="link" d="M520 636 L520 606 L390 606 L390 706"/>

      <path class="link" d="M926 636 L926 398"/>

      <path class="link" d="M1275 636 L1275 398 L1387 398"/>

      <path class="inherit" d="M190 862 L190 804 L236 804 L236 548"/>

      <path class="link" d="M520 862 L520 812 L236 812 L236 548"/>

      <path class="link" d="M620 862 L620 822 L1117 822 L1117 398"/>

      <path class="link" d="M690 862 L690 834 L1387 834 L1387 398"/>

      <path class="link" d="M964 862 L964 816 L577 816 L577 414"/>

      <path class="link" d="M1050 862 L1050 822 L1117 822 L1117 398"/>

      <path class="link" d="M1136 862 L1136 812 L224 812 L224 774"/>
    </svg>
  </div>
</body>
</html>
